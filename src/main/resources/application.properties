spring.application.name=AuctionSystem
server.port=8080
# --- MONGODB CONFIGURATION ---
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=auction_system_db
# --- REDIS CONFIGURATION ---
spring.data.redis.host=localhost
spring.data.redis.port=6379
# --- SPRING SESSION CONFIGURATION ---
# Redis namespace to isolate session data for this application
spring.session.redis.namespace=auction:session
# Session timeout duration (e.g., 3600s = 1 hour)
server.servlet.session.timeout=3600s
# --- SECURITY COOKIE CONFIGURATION (ENTERPRISE STANDARD) ---
# Prevents client-side scripts from accessing the cookie (Mitigates XSS attacks)
server.servlet.session.cookie.http-only=true
# Set to false for local development (HTTP). MUST be set to true in production (HTTPS)
server.servlet.session.cookie.secure=false
# Controls cross-site request forgery (CSRF) protection
server.servlet.session.cookie.same-site=lax
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR